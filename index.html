<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Aprendices - Sistema Dual</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="row w-100 justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                
                <div class="card shadow border-0">
                    
                    <div class="card-header bg-dark text-white text-center py-4">
                        <h3 class="m-0 fw-bold"><i class="bi bi-person-plus-fill me-2"></i>Registro de Aprendices</h3>
                        <p class="text-white-50 m-0 mt-1 fs-7">Persistencia simultánea en PostgreSQL & MongoDB Atlas</p>
                    </div>
                    
                    <div class="card-body p-4 p-sm-5">
                        <form action="controlador/logica.php" method="post">
                            
                            <div class="mb-4">
                                <label for="nom" class="form-label fw-semibold text-secondary">
                                    <i class="bi bi-person-vcard text-primary me-1"></i> Nombre completo:
                                </label>
                                <input type="text" name="nom" id="nom" required 
                                       class="form-control form-control-lg fs-6 shadow-sm" 
                                       placeholder="Ej. Juan Pérez">
                            </div>
                            
                            <div class="mb-4">
                                <label for="tel" class="form-label fw-semibold text-secondary">
                                    <i class="bi bi-telephone text-primary me-1"></i> Teléfono de contacto:
                                </label>
                                <input type="number" name="tel" id="tel" required 
                                       min="3000000000" max="4000000000" 
                                       class="form-control form-control-lg fs-6 shadow-sm" 
                                       placeholder="Ej. 3215687484">
                                <div class="form-text text-muted fs-8 px-1">Debe ser un número celular válido de 10 dígitos.</div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="det" class="form-label fw-semibold text-secondary">
                                    <i class="bi bi-chat-left-text text-primary me-1"></i> Detalles de la sugerencia:
                                </label>
                                <textarea name="det" id="det" required rows="3" 
                                          class="form-control shadow-sm" 
                                          placeholder="Escribe aquí los detalles o comentarios..."></textarea>
                            </div>
                            
                            <div class="d-grid gap-2 mt-5">
                                <button type="submit" id="boton" class="btn btn-primary btn-lg shadow-sm py-2 fw-semibold">
                                    <i class="bi bi-send-fill me-2"></i> Enviar y Procesar Registro
                                </button>
                            </div>
                            
                        </form>
                    </div>
                    
                    <div class="card-footer bg-white text-center py-3 border-0">
                        <span class="badge bg-primary-subtle text-primary px-3 py-2 me-1">
                            <i class="bi bi-database-fill me-1"></i> SQL Active
                        </span>
                        <span class="badge bg-success-subtle text-success px-3 py-2">
                            <i class="bi bi-hdd-network-fill me-1"></i> NoSQL Active
                        </span>
                    </div>

                </div>
                
            </div>
        </div>
    </div>

    <style>
        .fs-7 { font-size: 0.9rem; }
        .fs-8 { font-size: 0.78rem; }
        /* Suaviza las esquinas de los inputs */
        .form-control, .btn { border-radius: 8px; }
    </style>
</body>
</html>
